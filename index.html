<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amena Flow</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C9B6FF">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="main">

    <div class="card">
      <h1>🌸 Amena Flow</h1>
      <p>Your calm study companion</p>
    </div>

    <div class="card">
      <h2>Today's Focus</h2>
      <p>Start small. Flow will follow.</p>
    </div>

    <div id="yejunPanel" class="card">
      <h2>Yejun</h2>
      <div id="chatBox"></div>

      <input id="userInput" placeholder="Talk to Yejun...">
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>
